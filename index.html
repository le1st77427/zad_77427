<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Oleksandr Zavoloka(77427) - Zadania</title>
    <style>
        /* Zmienione tło na nieco cieplejszy odcień szarości */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px; 
            background: #f4f7f6; 
            color: #333;
        }

        .box { 
            display: inline-block; 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            border-top: 5px solid #28a745; /* Zielony akcent na górze */
        }

        h1 {
            margin-bottom: 30px;
            color: #2c3e50;
        }

        /* Nowy styl przycisków - odcienie zieleni */
        a { 
            display: block; 
            margin: 15px 0; 
            padding: 14px 30px; 
            background: #28a745; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600;
            transition: all 0.3s ease; /* Płynna zmiana koloru i skali */
        }

        /* Efekt po najechaniu - ciemniejszy zielony i lekkie uniesienie */
        a:hover { 
            background: #218838; 
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Moje Zadania</h1>
        <a href="./zad1_cv/index.html">Zadanie 1 (HTML)</a>
        <a href="./zad2_css/index.html">Zadanie 2 (CSS)</a>
        </div>
</body>
</html>
