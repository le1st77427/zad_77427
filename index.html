<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadania - Panel</title>

    <style>

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #eef2f3; 
        }

        .box { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h1 {

            font-size: 24px;
            color: #2d3436;
            margin-bottom: 30px;
            letter-spacing: -0.5px;

        }

        a { 

            display: block; 
            margin-bottom: 15px; 
            padding: 15px; 

            background: linear-gradient(
                135deg,
                #2ecc71,
                #27ae60
            ); 

            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 500;

            transition: all 0.3s ease;

            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);

        }

        a:hover { 

            transform: scale(1.03);

            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.4);

            filter: brightness(1.05);

        }

        a:last-child {

            margin-bottom: 0;

        }

    </style>

</head>

</html>
