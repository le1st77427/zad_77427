<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadanie 5 - Formularz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Formularz Kontaktowy</h2>
        <form id="contactForm" novalidate>
            <div class="form-group">
                <label for="firstName">Imię</label>
                <input type="text" id="firstName" placeholder="Wpisz imię">
                <span class="error-text" id="firstNameError"></span>
            </div>

            <div class="form-group">
                <label for="lastName">Nazwisko</label>
                <input type="text" id="lastName" placeholder="Wpisz nazwisko">
                <span class="error-text" id="lastNameError"></span>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="example@mail.com">
                <span class="error-text" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="message">Wiadomość</label>
                <textarea id="message" rows="4" placeholder="Twoja wiadomość..."></textarea>
                <span class="error-text" id="messageError"></span>
            </div>

            <button type="submit">Wyślij</button>
            <div id="formStatus"></div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
